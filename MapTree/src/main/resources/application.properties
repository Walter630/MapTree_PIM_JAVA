spring.application.name=MapTree
server.port=${SERVER_PORT:8080}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:}

#Data base-------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

#JPA -----------
spring.jpa.show-sql=true
spring.threads.virtual.enabled=true
spring.jpa.hibernate.ddl-auto=update
#TOKEN -------------
security.token=${JWT_TOKEN}

# URL do Swagger


# Mostra os endpoints na ordem que foram declarados
springdoc.swagger-ui.operations-sorter=method

# Swagger ? lê do .env, padrão false se não encontrar
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
